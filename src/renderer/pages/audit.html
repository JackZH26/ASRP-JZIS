<div class="page-header">
  <div>
    <h1 data-i18n="audit.title">Log</h1>
    <p data-i18n="audit.subtitle">All operations, agent actions, and system events</p>
  </div>
  <div class="actions">
    <button class="btn btn-outline btn-sm" onclick="exportCSV()" data-i18n="audit.export_csv">Export CSV</button>
    <button class="btn btn-outline btn-sm" onclick="loadAuditLog()" data-i18n="common.refresh">Refresh</button>
  </div>
</div>

<!-- Filter Panel -->
<div class="panel mb-2" style="padding:12px 14px">
  <div style="display:flex;gap:16px;flex-wrap:wrap;align-items:flex-start">
    <!-- Type filter (MECE) -->
    <div>
      <div style="font-size:11px;font-weight:600;color:var(--text-secondary);margin-bottom:6px;text-transform:uppercase" data-i18n="audit.filter_type">Type</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap" id="type-chips">
        <button class="log-chip active" data-type="research" onclick="toggleChip(this,'type')" data-i18n="audit.type_research">research</button>
        <button class="log-chip active" data-type="agent" onclick="toggleChip(this,'type')" data-i18n="audit.type_agent">agent</button>
        <button class="log-chip active" data-type="api" onclick="toggleChip(this,'type')" data-i18n="audit.type_api">api</button>
        <button class="log-chip active" data-type="file" onclick="toggleChip(this,'type')" data-i18n="audit.type_file">file</button>
        <button class="log-chip active" data-type="system" onclick="toggleChip(this,'type')" data-i18n="audit.type_system">system</button>
        <button class="log-chip active" data-type="config" onclick="toggleChip(this,'type')" data-i18n="audit.type_config">config</button>
      </div>
    </div>
    <!-- Agent filter -->
    <div>
      <div style="font-size:11px;font-weight:600;color:var(--text-secondary);margin-bottom:6px;text-transform:uppercase" data-i18n="audit.filter_agent">Agent</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap" id="agent-chips">
        <button class="log-chip active" data-agent="Theorist" onclick="toggleChip(this,'agent')" data-i18n="audit.agent_theorist">Theorist</button>
        <button class="log-chip active" data-agent="Engineer" onclick="toggleChip(this,'agent')" data-i18n="audit.agent_engineer">Engineer</button>
        <button class="log-chip active" data-agent="Assistant" onclick="toggleChip(this,'agent')" data-i18n="audit.agent_assistant">Assistant</button>
        <button class="log-chip active" data-agent="System" onclick="toggleChip(this,'agent')" data-i18n="audit.agent_system">System</button>
      </div>
    </div>
    <!-- Research filter -->
    <div>
      <div style="font-size:11px;font-weight:600;color:var(--text-secondary);margin-bottom:6px;text-transform:uppercase" data-i18n="audit.filter_research">Research</div>
      <select id="log-research-filter" style="padding:4px 8px;border:1px solid var(--border);border-radius:6px;font-size:12px;background:var(--bg-secondary);color:var(--text)" onchange="applyFilters()">
        <option value="" data-i18n="audit.research_all">All</option>
      </select>
    </div>
    <!-- Date range -->
    <div>
      <div style="font-size:11px;font-weight:600;color:var(--text-secondary);margin-bottom:6px;text-transform:uppercase" data-i18n="audit.filter_date">Date Range</div>
      <div style="display:flex;gap:6px;align-items:center">
        <input type="date" id="date-from" style="padding:3px 6px;border:1px solid var(--border);border-radius:6px;font-size:12px;background:var(--bg-secondary);color:var(--text)" onchange="applyFilters()">
        <span style="font-size:12px;color:var(--text-secondary)" data-i18n="audit.date_to">to</span>
        <input type="date" id="date-to" style="padding:3px 6px;border:1px solid var(--border);border-radius:6px;font-size:12px;background:var(--bg-secondary);color:var(--text)" onchange="applyFilters()">
      </div>
    </div>
  </div>
</div>

<!-- Log Entries -->
<div class="panel" style="padding:0">
  <div id="audit-timeline" style="padding:0">
    <div class="loading" style="padding:24px;justify-content:center"><div class="spinner"></div> <span data-i18n="common.loading">Loading...</span></div>
  </div>
  <div id="load-more-wrap" style="display:none;padding:12px;text-align:center;border-top:1px solid var(--border)">
    <button class="btn btn-outline btn-sm" onclick="loadMoreAudit()" data-i18n="audit.load_more">Load more entries</button>
  </div>
</div>

<style>
.log-chip {
  padding:3px 10px;border-radius:12px;font-size:11px;font-weight:500;border:1px solid var(--border);background:var(--accent);color:#fff;cursor:pointer;transition:all 0.15s
}
.log-chip:not(.active) { background:var(--bg-secondary);color:var(--text-secondary);border-color:var(--border) }
.log-entry {
  display:flex;gap:10px;padding:8px 16px;border-bottom:1px solid var(--border-light,rgba(0,0,0,0.06));align-items:baseline;font-size:13px;transition:background 0.1s
}
.log-entry:hover { background:var(--hover-bg,rgba(0,0,0,0.02)) }
.log-entry:last-child { border-bottom:none }
.log-time {
  font-size:11px;color:var(--text-tertiary);white-space:nowrap;min-width:120px;font-family:var(--font-mono);flex-shrink:0
}
.log-type {
  padding:1px 7px;border-radius:6px;font-size:10px;font-weight:600;text-transform:uppercase;white-space:nowrap;flex-shrink:0;min-width:60px;text-align:center
}
.log-type.research { background:rgba(124,105,240,0.1);color:#7c69f0 }
.log-type.agent { background:rgba(74,140,106,0.1);color:#4a8c6a }
.log-type.api { background:rgba(59,130,246,0.1);color:#3b82f6 }
.log-type.file { background:rgba(217,119,6,0.1);color:#d97706 }
.log-type.system { background:rgba(100,116,139,0.1);color:#64748b }
.log-type.config { background:rgba(168,85,247,0.1);color:#a855f7 }
.log-msg { flex:1;color:var(--text);line-height:1.5 }
.log-agent { font-size:11px;font-weight:600;color:var(--text-secondary);white-space:nowrap;flex-shrink:0 }
.log-research-code { font-family:var(--font-mono);font-size:10px;color:var(--accent);font-weight:700;white-space:nowrap;flex-shrink:0 }
.log-tokens {
  font-size:11px;color:var(--text-tertiary);white-space:nowrap;min-width:60px;text-align:right;font-family:var(--font-mono);flex-shrink:0
}
</style>

<script>
(function() {
  let allEntries = [];
  let displayOffset = 0;
  const PAGE_SIZE = 50;

  // Active filter sets
  let activeTypes = new Set(['research','agent','api','file','system','config']);
  let activeAgents = new Set(['Theorist','Engineer','Assistant','System']);
  // Agent names that have a dedicated chip — anything else (e.g. bot display
  // names) is shown unconditionally so unknown actors aren't silently hidden.
  const KNOWN_AGENT_CHIPS = new Set(['Theorist','Engineer','Assistant','System']);

  // MECE log types:
  // research — research lifecycle: register, edit, archive, status change, scoring
  // agent    — agent operations: start, stop, task assignment, role actions
  // api      — external API calls: model queries, token consumption, rate limits
  // file     — file operations: upload, download, paper management
  // system   — platform events: health checks, backups, updates, startup/shutdown
  // config   — configuration: settings changes, workspace changes, user management

  // Populate research filter dropdown from entries
  function populateResearchFilter() {
    const select = document.getElementById('log-research-filter');
    const codes = [...new Set(allEntries.map(e => e.research).filter(Boolean))].sort();
    // Keep the "All" option, add research codes
    select.innerHTML = '<option value="">' + t('audit.research_all') + '</option>' + codes.map(c =>
      '<option value="' + c + '">' + c + '</option>'
    ).join('');
  }

  window.loadAuditLog = async function() {
    displayOffset = 0;
    if (!window.asrp) {
      allEntries = [];
      populateResearchFilter();
      applyFilters();
      return;
    }
    try {
      // Pull a generous initial slice (up to 500 entries) so client-side filters
      // have something to work with. Older entries are paginated via loadMoreAudit.
      const { entries, total } = await window.asrp.audit.list({ limit: 500, offset: 0 });
      allEntries = Array.isArray(entries) ? entries : [];
      const totalCount = (typeof total === 'number') ? total : allEntries.length;
      const moreWrap = document.getElementById('load-more-wrap');
      if (moreWrap) moreWrap.style.display = totalCount > allEntries.length ? 'block' : 'none';
    } catch (err) {
      console.warn('[audit] list failed:', err);
      allEntries = [];
    }
    populateResearchFilter();
    applyFilters();
  };

  window.applyFilters = function() {
    const dateFrom = document.getElementById('date-from').value;  // YYYY-MM-DD
    const dateTo = document.getElementById('date-to').value;      // YYYY-MM-DD
    const researchFilter = document.getElementById('log-research-filter').value;

    // Convert YYYY-MM-DD to Date for unambiguous comparison against ISO timestamps
    const fromMs = dateFrom ? new Date(dateFrom + 'T00:00:00').getTime() : null;
    const toMs = dateTo ? new Date(dateTo + 'T23:59:59.999').getTime() : null;

    let filtered = allEntries.filter(e => {
      if (!activeTypes.has(e.type || 'system')) return false;
      const agentName = e.agent || 'System';
      // Known chip → respect chip state. Unknown agent (bot display name etc.) → always pass.
      if (KNOWN_AGENT_CHIPS.has(agentName) && !activeAgents.has(agentName)) return false;
      if (researchFilter && e.research !== researchFilter) return false;
      if (e.timestamp) {
        const ms = Date.parse(e.timestamp);
        if (!isNaN(ms)) {
          if (fromMs !== null && ms < fromMs) return false;
          if (toMs !== null && ms > toMs) return false;
        }
      }
      return true;
    });

    renderTimeline(filtered.slice(0, PAGE_SIZE));
  };

  function renderTimeline(entries) {
    const container = document.getElementById('audit-timeline');
    if (!entries.length) {
      container.innerHTML = '<div class="empty-state" style="padding:32px"><h3>' + t('audit.no_entries') + '</h3><p>' + t('audit.no_entries_hint') + '</p></div>';
      return;
    }
    container.innerHTML = entries.map(e => {
      const ts = e.timestamp || '';
      const timeStr = ts.slice(0,10) + ' ' + (ts.slice(11,16) || '—');
      const tokensStr = e.tokens ? e.tokens.toLocaleString() + ' tk' : '—';
      return `<div class="log-entry">
        <span class="log-time">${timeStr}</span>
        <span class="log-type ${e.type || 'system'}">${e.type || 'system'}</span>
        <span class="log-agent">${escHtml(e.agent || 'System')}</span>
        ${e.research ? '<span class="log-research-code">' + escHtml(e.research) + '</span>' : ''}
        <span class="log-msg">${escHtml(e.message)}</span>
        <span class="log-tokens">${tokensStr}</span>
      </div>`;
    }).join('');
  }

  // Chip toggle
  window.toggleChip = function(btn, group) {
    btn.classList.toggle('active');
    if (group === 'type') {
      const t = btn.dataset.type;
      if (activeTypes.has(t)) activeTypes.delete(t); else activeTypes.add(t);
    } else if (group === 'agent') {
      const a = btn.dataset.agent;
      if (activeAgents.has(a)) activeAgents.delete(a); else activeAgents.add(a);
    }
    applyFilters();
  };

  window.loadMoreAudit = async function() {
    if (!window.asrp) return;
    const nextOffset = allEntries.length;
    try {
      const { entries, total } = await window.asrp.audit.list({ limit: 500, offset: nextOffset });
      if (Array.isArray(entries) && entries.length) {
        allEntries = [...allEntries, ...entries];
        populateResearchFilter();
        applyFilters();
      }
      const totalCount = (typeof total === 'number') ? total : allEntries.length;
      const moreWrap = document.getElementById('load-more-wrap');
      if (moreWrap) moreWrap.style.display = totalCount > allEntries.length ? 'block' : 'none';
    } catch (err) {
      console.warn('[audit] load more failed:', err);
    }
  };

  // CSV Export — pulls the full audit log from the backend so the export
  // isn't capped to the entries currently loaded in the UI.
  window.exportCSV = async function() {
    if (!window.asrp) return;

    let csv = '';
    let exportedCount = allEntries.length;
    try {
      const result = await window.asrp.audit.export();
      if (result && result.success && typeof result.csv === 'string') {
        csv = result.csv;
        // Count rows (excluding header) for the toast
        exportedCount = Math.max(0, csv.split('\n').filter(Boolean).length - 1);
      }
    } catch (err) {
      console.warn('[audit] export failed, falling back to in-memory entries:', err);
    }

    if (!csv) {
      // Fallback: build from whatever the UI has loaded
      const header = 'timestamp,type,agent,research,message,tokens\n';
      const rows = allEntries.map(e =>
        [e.timestamp||'', e.type||'', e.agent||'', e.research||'', '"' + (e.message||'').replace(/"/g,'""') + '"', e.tokens||0].join(',')
      ).join('\n');
      csv = header + rows + '\n';
    }

    const dialog = await window.asrp.files.saveDialog({
      defaultPath: t('audit.export_filename'),
      filters: [{ name: t('audit.csv_label'), extensions: ['csv'] }],
      title: t('audit.export_title'),
    });
    if (!dialog.canceled && dialog.filePath) {
      const writeRes = await window.asrp.files.write(dialog.filePath, csv);
      if (writeRes.success && typeof Toast !== 'undefined') {
        Toast.show(t('audit.exported', { count: exportedCount }), 'success');
      }
    }
  };

  function escHtml(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  loadAuditLog();
  if (typeof translatePage === 'function') translatePage();
  function _auditOnLang() {
    if (typeof translatePage === 'function') translatePage();
    if (typeof applyFilters === 'function') applyFilters();
  }
  window.addEventListener('language-changed', _auditOnLang);
  if (window.Utils) window.Utils.onPageUnload(function () {
    window.removeEventListener('language-changed', _auditOnLang);
  });
})();
</script>
